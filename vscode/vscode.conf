{
  "emmet.variables": {
    "lang": "ja"
  },
  "emmet.triggerExpansionOnTab": true,
  "emmet.includeLanguages": {
    "erb": "html",
    "ts": "html",
    "jsx": "html"
  },
  "editor.formatOnPaste": true,
  "explorer.confirmDragAndDrop": false,
  "editor.acceptSuggestionOnEnter": "off",
  "workbench.iconTheme": "vscode-icons",
  //fontsizeを小さく
  "terminal.integrated.fontSize": 12,
  //wrap
  "files.trimTrailingWhitespace": true, //fontsize
  "editor.wordWrap": "on", //1行長くならないように
  "editor.lineHeight": 0, //1行の高さ
  "editor.renderLineHighlight": "all", //現在の行番号含めて強調表示する
  "editor.minimap.enabled": false, //minimap削除
  "editor.insertSpaces": true, //tabをスペースとして扱う
  "editor.tabSize": 2, //tabをデフォルトで2にする
  "editor.renderWhitespace": "none", //エディタ上での空白表示設定
  "editor.renderControlCharacters": true, //制御文字の表示
  "editor.cursorBlinking": "solid", //カーソルの点滅をヌルヌルにする
  "editor.autoIndent": "keep", //autoindentを入れる
  "editor.fontFamily": "Cica,Consolas, 'Courier New', monospace", //font settings
  "extensions.autoUpdate": true, //プラグインを自動アップデート
  "editor.autoClosingBrackets": "beforeWhitespace",
  "editor.autoClosingQuotes": "beforeWhitespace",
  "breadcrumbs.enabled": true, //パンクズリスト
  "editor.detectIndentation": false, //indent設定はファイル設定ではなく、自分の設定を優先する
  "editor.snippetSuggestions": "top", // スニペットを候補の上部に表示する
  //zen mode settings
  "zenMode.fullScreen": true,
  "zenMode.centerLayout": true,
  "zenMode.hideActivityBar": true,
  "zenMode.hideLineNumbers": false,
  "zenMode.hideStatusBar": true,
  "zenMode.restore": false,
  // "editor.rulers": [80,130],                                                       //目安を表示
  //サジェスチョン
  "editor.quickSuggestionsDelay": 400, //入力補完の検出タイミング
  // "editor.quickSuggestions":false,
  "editor.quickSuggestions": {
    //入力補完を自動で表示する
    "other": true, //文字列以外
    "strings": true, //文字列
    "comments": false //コメント
  },
  "editor.tokenColorCustomizations": {
    "comments": {
      "foreground": "#7f9ea0", //コメントの色
      "fontStyle": ""
    },
    "functions": {
      "fontStyle": "underline"
    }
  },
  //encodings
  "files.autoGuessEncoding": true, // 有効な場合、ファイルを開くときに文字セット エンコードを推測します。言語ごとに構成することも可能
  "files.autoSave": "off", //ダーティファイルの作成を無効化
  "files.eol": "auto", //既定の改行文字をautoにする
  //----------------------------------------------------------
  // vscodeのバージョン管理系
  //----------------------------------------------------------
  // ソース管理プロバイダーのセクションを常に表示するかどうか。
  "scm.alwaysShowProviders": true,
  //----------------------------------------------------------
  // vscodeの作業環境の設定(おもにタブの設定をvimと近づけるために設定)
  //----------------------------------------------------------
  "workbench.editor.labelFormat": "short",
  "workbench.editor.revealIfOpen": true,
  "workbench.editor.showIcons": true,
  "workbench.editor.highlightModifiedTabs": true,
  "workbench.editor.tabCloseButton": "left",
  "workbench.startupEditor": "newUntitledFile",
  "workbench.editor.openPositioning": "last",
  "explorer.openEditors.visible": 0,
  // エクスプローラーから非表示にするファイル
  "files.exclude": {
    "tags": true,
    "**/.svn": true,
    "**/.git": true,
    "**/.DS_Store": true
  },
  // ファイル監視から除外するファイル
  "files.watcherExclude": {
    "**/.git/objects/**": true,
    "**/.git/subtree-cache/**": true,
    "**/node_modules/*/**": true,
    "**/.svn/**": true
  },
  // ファイルブラウザには表示するが、検索から除外する
  "search.exclude": {
    "**/node_modules": true,
    "**/bower_components": true,
    "**/tmp/cache": true,
    "tags": true,
    "**/.svn": true,
    "**/.tags": true
  },
  //----------------------------------------------------------
  // vscodeのdebugの設定
  //----------------------------------------------------------
  "debug.inlineValues": "on",
  "window.newWindowDimensions": "default",
  "workbench.tips.enabled": false,
  "C_Cpp.updateChannel": "Insiders",
  //vscode sync
  "sync.forceDownload": false,
  "sync.quietSync": false,
  "sync.askGistName": false,
  "sync.removeExtensions": true,
  "sync.syncExtensions": true,
  "sync.autoDownload": false,
  "sync.autoUpload": false,
  // ワークベンチ設定
  "workbench.editor.showTabs": "multiple", //毎回新規で開く
  "workbench.editor.enablePreviewFromQuickOpen": false, // アクティビティバー
  "workbench.editor.tabSizing": "shrink", // タブが多い場合,文字を非表示にしてもタブ表示を優先する
  "workbench.statusBar.visible": true, // ステータスバー(下端)を表示
  "workbench.sideBar.location": "right", // サイドバーを右に
  "workbench.colorTheme": "Default High Contrast",
  "workbench.colorCustomizations": {
    "editor.lineHighlightBackground": "#dbdbdb21", //現在の行の背景色
    "editor.selectionBackground": "#b3fde7", //選択業の背景
    "editor.selectionHighlightBorder": "#00ff2a", //線学業の前背景
    "editorError.border": "#ff0000", //エラーの下線の色
    "tab.activeBorder": "#ffffff", //アクティブなタブの色
    "tab.inactiveForeground": "#999999", //アクティブでないタブの色
    "editorSuggelectedBackground": "#4792b4", //選択しているサジェストの背景色
    "editorSuggestWidget.foreground": "#f1efef", //選択しているサジェストの文字色
    "editorWhitespace.foreground": "#8a8888" //tab等の制御文字
  },
  // クラッシュレポートを送信しない
  "telemetry.enableCrashReporter": false,
  "telemetry.enableTelemetry": false,
  //========================================================================
  //markdown settings
  //========================================================================
  "markdown.preview.breaks": true,
  //========================================================================
  //言語毎の設定
  //========================================================================
  "[markdown]": {
    "editor.tabSize": 2, //タブサイズの設定
    "editor.quickSuggestions": {
      "comments": "on",
      "strings": "on",
      "other": "on"
    }, //サジェスチョンをすべて有効にする
    "editor.quickSuggestionsDelay": 0 //サジェスチョンのディレイ
  },
  "[json]": {
    "editor.tabSize": 2
  },
  //========================================================================
  //plugin settings
  //========================================================================

  "terminal.integrated.tabs.enabled": true,
  "files.associations": {
    "*.inc": "php"
  },
  "editor.suggestSelection": "first",
  "terminal.integrated.defaultProfile.linux": "zsh",
  "remote.SSH.remotePlatform": {
    "kserver": "linux",
    "dev": "linux"
  },
  "vsicons.dontShowNewVersionMessage": true,
  "git.confirmSync": false,
  "window.zoomLevel": 3,
  "workbench.editor.tabActionLocation": "left",
  "extensions.experimental.affinity": {
    "asvetliakov.vscode-neovim": 1
  },
  "vscode-neovim.useWSL": true,
  "vscode-neovim.neovimInitVimPaths.linux": "/home/kaito/git/dotfiles/.config/nvim/init.lua",
  "[typescriptreact]": {
    "editor.defaultFormatter": "rvest.vs-code-prettier-eslint"
  },
  "editor.formatOnSave": true,
  "prettier.endOfLine": "auto",
  "editor.defaultFormatter": "esbenp.prettier-vscode",
  "tslint.jsEnable": true,
  "tslint.packageManager": "yarn",
  "eslint.codeActionsOnSave.rules": null,
  "eslint.format.enable": true,
  "editor.semanticHighlighting.enabled": false,
  "editor.glyphMargin": false,
  "editor.folding": false,
  // gitmoji
